<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Semi-Intel v4.1 대시보드</title>
<meta name="description" content="반도체 사이클 투자 인텔리전스 — 26개 경제·섹터 지표 기반 실시간 복합 스코어링 (v4.1)">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#06080d;--surface:#0c1018;--elevated:#121822;--border:#1c2638;--text:#c8d6e5;--dim:#5a6d84;--muted:#3a4a5e;--accent:#00d4aa;--warn:#f0b429;--blue:#4dabf7;--red:#ff6b6b;--font:'Menlo','Consolas',monospace;--sans:-apple-system,'Segoe UI',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
header{background:linear-gradient(180deg,#0c1220,var(--bg));border-bottom:1px solid var(--border);padding:14px 24px}
.hdr-top{display:flex;justify-content:space-between;align-items:center}
.hdr-title{font-size:9px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;font-family:var(--font)}
.hdr-name{font-size:18px;font-weight:700;margin-top:2px}
.hdr-stats{display:flex;gap:20px;font-size:10px;font-family:var(--font)}
.hdr-stats div{text-align:right}
.hdr-stats .label{color:var(--dim)}
.tabs{display:flex;gap:2px;margin-top:14px;align-items:center}
.tab{padding:7px 18px;font-size:11px;font-family:var(--font);letter-spacing:1px;cursor:pointer;background:none;color:var(--dim);border:none;border-bottom:2px solid transparent}
.tab.active{color:var(--accent);background:var(--elevated);border-bottom-color:var(--accent)}
.tab:hover{color:var(--text)}
.tab-muted{padding:7px 14px;font-size:9px;font-family:var(--font);letter-spacing:1px;cursor:pointer;background:none;color:var(--muted);border:none;border-bottom:2px solid transparent;margin-left:auto;opacity:0.7}
.tab-muted.active{color:var(--dim);border-bottom-color:var(--muted);opacity:1}
.tab-muted:hover{opacity:1;color:var(--dim)}
main{padding:20px 24px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:minmax(220px,260px) minmax(0,1fr) minmax(220px,260px);gap:16px;align-items:start}
@media(max-width:1100px){.grid3{grid-template-columns:minmax(200px,240px) minmax(0,1fr) minmax(200px,240px)}}
@media(max-width:900px){.grid3{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.grid3{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px}
.card-title{font-size:9px;letter-spacing:2px;color:var(--dim);font-family:var(--font);margin-bottom:12px}
.score-big{font-size:48px;font-weight:700;font-family:var(--font);text-align:center}
.regime-label{text-align:center;font-size:11px;font-family:var(--font);letter-spacing:2px;margin-top:4px}
.dim-row{display:flex;align-items:center;gap:10px;padding:6px 0;cursor:pointer}
.dim-label{width:60px;font-size:10px;color:var(--dim);font-family:var(--font)}
.dim-bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.dim-fill{height:100%;border-radius:3px;transition:width 0.8s}
.dim-score{width:36px;text-align:right;font-size:12px;font-weight:600;font-family:var(--font)}
.dim-weight{width:30px;text-align:right;font-size:9px;color:var(--dim)}
.sig-card{padding:8px 10px;margin-bottom:4px;border-radius:0 4px 4px 0;font-size:10px}
.sig-card.bull{background:rgba(0,212,170,0.06);border-left:2px solid rgba(0,212,170,0.3)}
.sig-card.bear{background:rgba(255,107,107,0.06);border-left:2px solid rgba(255,107,107,0.3)}
.sig-id{font-weight:600;font-family:var(--font)}
.sig-desc{color:var(--text);margin-top:3px;line-height:1.5}
.sig-str{font-size:9px;color:var(--dim);font-family:var(--font)}
.action-item{font-size:11px;padding:6px 0;border-bottom:1px solid var(--border);line-height:1.5}
.action-item:last-child{border-bottom:none}
.action-arrow{color:var(--accent);margin-right:6px}
.sc-row{display:grid;grid-template-columns:160px 60px 1fr 55px 80px;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:10px;font-family:var(--font)}
.sc-header{color:var(--dim);font-size:9px}
.regime-box{padding:14px;border-radius:8px;border-top:3px solid}
.regime-box h4{font-size:11px;font-family:var(--font)}
.regime-box .range{font-size:9px;color:var(--dim);font-family:var(--font);margin-top:2px}
.regime-box .desc{font-size:10px;margin-top:8px;line-height:1.5}
.regime-box.current{opacity:1}
.regime-box.inactive{opacity:0.4}
.export-bar{display:flex;gap:8px;margin-bottom:16px}
.btn{padding:6px 14px;font-size:11px;font-family:var(--font);cursor:pointer;border-radius:4px;border:1px solid var(--border);background:var(--elevated);color:var(--accent)}
.btn:hover{background:var(--border)}
.btn-refresh{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.loading{text-align:center;padding:40px;color:var(--dim);font-family:var(--font)}
footer{border-top:1px solid var(--border);padding:10px 24px;font-size:9px;color:var(--muted);font-family:var(--font);display:flex;justify-content:space-between}
.chart-wrap{position:relative;height:160px}
.sub-signals{margin-left:70px;margin-bottom:8px;font-size:10px}
.sub-sig{display:flex;gap:8px;padding:2px 0;border-left:2px solid var(--border);padding-left:8px;margin-bottom:2px}
.alert-banner{background:rgba(240,180,41,0.15);border:1px solid rgba(240,180,41,0.5);border-left:4px solid var(--warn);padding:12px;border-radius:6px;margin-bottom:16px;font-family:var(--font);font-size:11px;color:var(--text);display:flex;align-items:center;gap:12px}
.alert-banner.bull{background:rgba(0,212,170,0.15);border-color:rgba(0,212,170,0.5);border-left-color:var(--accent)}
.alert-banner.bear{background:rgba(255,107,107,0.15);border-color:rgba(255,107,107,0.5);border-left-color:var(--red)}
/* Cycle Diagram */
.cycle-diagram{position:relative;width:220px;height:220px;margin:0 auto 16px}
.cycle-ring{position:absolute;inset:0}
.cycle-phase{position:absolute;width:92px;height:92px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;font-family:var(--font);letter-spacing:1px;opacity:0.35;transition:all 0.4s;border:2px solid transparent;cursor:default}
.cycle-phase.active{opacity:1;transform:scale(1.08);box-shadow:0 0 20px rgba(0,0,0,0.5)}
.cycle-phase .ph-label{font-weight:700;font-size:10px}
.cycle-phase .ph-range{font-size:8px;margin-top:2px;opacity:0.7}
.cycle-marker{position:absolute;width:12px;height:12px;border-radius:50%;z-index:5;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 4px 2px rgba(255,255,255,0.3)}50%{box-shadow:0 0 12px 4px rgba(255,255,255,0.6)}}
/* Evidence panel */
.evidence-panel{background:var(--elevated);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:16px}
.evidence-title{font-size:10px;font-family:var(--font);letter-spacing:2px;color:var(--warn);margin-bottom:10px;font-weight:700}
.evidence-item{display:flex;gap:8px;align-items:flex-start;padding:5px 0;font-size:11px;line-height:1.5;border-bottom:1px solid var(--border)}
.evidence-item:last-child{border-bottom:none}
.evidence-icon{font-size:12px;flex-shrink:0;margin-top:1px}
.evidence-text{flex:1}
.evidence-tag{font-size:8px;font-family:var(--font);padding:1px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:0.5px;opacity:0.8}
.tag-leading{background:rgba(0,212,170,0.15);color:#00d4aa}
.tag-coincident{background:rgba(77,171,247,0.15);color:#4dabf7}
.tag-lagging{background:rgba(90,109,132,0.15);color:#5a6d84}
/* Methodology */
.method-section{margin-bottom:24px}
.method-section h3{font-size:13px;color:var(--accent);font-weight:600;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.method-section p,.method-section li{font-size:12px;line-height:1.8;color:var(--text)}
.method-section ul{padding-left:18px;margin-top:6px}
.method-table{width:100%;border-collapse:collapse;font-size:11px;font-family:var(--font)}
.method-table th{text-align:left;padding:6px 10px;background:var(--elevated);color:var(--dim);font-size:9px;letter-spacing:1px;border-bottom:1px solid var(--border)}
.method-table td{padding:6px 10px;border-bottom:1px solid var(--border)}
.method-note{font-size:10px;color:var(--dim);margin-top:8px;font-style:italic;line-height:1.6}
/* 커버리지 tooltip */
.cov-detail{font-size:9px;color:var(--dim);font-family:var(--font);margin-top:4px;padding:4px 8px;background:var(--bg);border-radius:4px;border:1px solid var(--border)}
</style>
</head>
<body>
<header>
  <div class="hdr-top">
    <div>
      <div class="hdr-title">Semi-Intel v4.1</div>
      <div class="hdr-name">Memory Cycle Now</div>
    </div>
    <div class="hdr-stats">
      <div><div class="label">신뢰도</div><div id="hdr-conf">-</div></div>
      <div><div class="label">커버리지</div><div id="hdr-cov">-</div></div>
      <div><div class="label">시그널 수</div><div id="hdr-sig">-</div></div>
      <button class="btn btn-refresh" onclick="refreshAll()">새로고침</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('overview')">OVERVIEW</button>
    <button class="tab" onclick="showTab('signals')">SIGNALS</button>
    <button class="tab" onclick="showTab('scenarios')">SCENARIOS</button>
    <button class="tab" onclick="showTab('trends')">TRENDS</button>
    <button class="tab" onclick="showTab('data')">DATA</button>
    <button class="tab" onclick="showTab('reference')">REFERENCE (Offline)</button>
    <button class="tab-muted" onclick="showTab('methodology')">ⓘ METHODOLOGY</button>
  </div>
  <div style="padding:10px 24px 0;font-size:9px;color:var(--dim);font-family:var(--font);display:flex;gap:16px">
    <span id="pipe-status">Pipeline: Checking...</span>
    <span id="pipe-next">다음 실행: -</span>
  </div>
</header>

<main>
  <div id="tab-overview"></div>
  <div id="tab-signals" style="display:none"></div>
  <div id="tab-scenarios" style="display:none"></div>
  <div id="tab-trends" style="display:none"></div>
  <div id="tab-data" style="display:none"></div>
  <div id="tab-reference" style="display:none"></div>
  <div id="tab-methodology" style="display:none"></div>
</main>

<footer>
  <span>Semi-Intel v4.1 — Based on "The Secrets of Economic Indicators" + Sector Extensions</span>
  <span id="last-update">-</span>
</footer>

<script>
const API = '';
const REGIME_COLORS = {expansion:'#00d4aa',late_cycle:'#f0b429',contraction:'#ff6b6b',recovery:'#4dabf7'};
const REGIME_LABELS = {expansion:'EXPANSION',late_cycle:'LATE CYCLE',contraction:'CONTRACTION',recovery:'RECOVERY'};
const DIM_LABELS = {demand_cycle:'DEMAND',supply_cycle:'SUPPLY',price_cycle:'PRICE',macro_regime:'MACRO',global_demand:'GLOBAL'};
const SIG_COLORS = {bullish:'#00d4aa',bearish:'#ff6b6b',neutral:'#5a6d84'};

// Indicator lead/lag classification for evidence
const INDICATOR_TYPE = {
  // Leading (2-18 months ahead)
  'ISM_MFG':'leading','DGORDER':'leading','YIELD_CURVE':'leading','LEI':'leading',
  'HOUSING':'leading','EQUIP_PROXY':'leading','HBM_PREMIUM':'leading',
  // Coincident (real-time)
  'INDPRO':'coincident','RETAIL':'coincident','SOX':'coincident',
  'DRAM_PROXY':'coincident','NAND_PROXY':'coincident','CLAIMS':'coincident',
  'CONSUMER_CONF':'coincident','FOMC':'coincident',
  // Lagging (confirms past)
  'GDP':'lagging','CPI':'lagging','PPI':'lagging','NFP':'lagging',
  'TRADE':'lagging','WSTS':'lagging','PRODUCTIVITY':'lagging',
  'HYPERSCALER_CAPEX':'lagging','CHINA_PMI':'coincident'
};

const DIM_WEIGHTS_RATIONALE = {
  demand_cycle: {pct:'30%', why:'반도체 매출의 80% 이상이 수요 사이클에 직접 연동. 신규주문(DGORDER), ISM PMI, 빅테크 CapEx가 사이클 전환점의 가장 빠른 신호'},
  supply_cycle: {pct:'20%', why:'공급 과잉/부족이 가격과 마진을 결정. 가동률 80% 이상에서 증설 투자 트리거, 장비 B/B ratio가 핵심'},
  price_cycle: {pct:'20%', why:'DRAM/NAND 가격이 반도체 기업 실적에 직접 반영. 메모리 가격 상승/하락 사이클이 투자 수익률을 좌우'},
  macro_regime: {pct:'20%', why:'금리·유동성 환경이 테크 밸류에이션의 할인율을 결정. 수익률곡선 역전은 12-18개월 후 경기침체를 선행'},
  global_demand: {pct:'10%', why:'반도체는 글로벌 교역재. 중국이 최대 소비국(~35%)이나, 수출 규제로 직접 영향이 제한적이어서 비중 하향'}
};

let scoreData = null, scenarioData = null, statusData = null, charts = {};

async function fetchJSON(url){
  try{const r=await fetch(API+url);if(!r.ok)throw new Error(r.status);return await r.json();}
  catch(e){console.error('Fetch error:',url,e);return null;}
}

function showTab(id){
  document.querySelectorAll('[id^=tab-]').forEach(e=>e.style.display='none');
  document.getElementById('tab-'+id).style.display='';
  document.querySelectorAll('.tab,.tab-muted').forEach(e=>e.classList.remove('active'));
  event.target.classList.add('active');
  if(id==='trends')renderTrends();
  if(id==='methodology')renderMethodology();
  if(id==='reference')renderMemoryReference();
}

function dimColor(s){return s>=60?'#00d4aa':s<40?'#ff6b6b':'#f0b429';}

async function refreshAll(){
  document.getElementById('tab-overview').innerHTML='<div class="loading">로딩 중...</div>';
  scoreData = await fetchJSON('/api/score');
  scenarioData = await fetchJSON('/api/scenarios/compare');
  statusData = await fetchJSON('/api/status');
  if(scoreData){
    document.getElementById('hdr-conf').textContent=scoreData.confidence_level?.toUpperCase()||'-';
    document.getElementById('hdr-conf').style.color=scoreData.confidence_level==='high'?'#00d4aa':scoreData.confidence_level==='medium'?'#f0b429':'#ff6b6b';
    document.getElementById('hdr-cov').textContent=Math.round((scoreData.data_coverage||0)*100)+'%';
    document.getElementById('hdr-sig').textContent=scoreData.signal_count||'0';
    document.getElementById('last-update').textContent='업데이트: '+new Date().toLocaleString('ko-KR');
  }
  if(statusData && statusData.pipeline){
    const p = statusData.pipeline;
    document.getElementById('pipe-status').innerHTML = `자동 파이프라인: <span style="color:${p.is_running?'#00d4aa':'#ff6b6b'}">${p.is_running?'실행중':'정지'}</span> (마지막: ${p.last_run_time?p.last_run_time.substring(0,16):'Never'})`;
    document.getElementById('pipe-next').textContent = `다음 실행: ${p.next_run_time?p.next_run_time.substring(0,16):'-'}`;
  }
  renderOverview();
  renderSignals();
  renderScenarios();
  renderDataTab();
}

// ============================================================
// CYCLE DIAGRAM (SVG-free, pure CSS)
// ============================================================
function renderCycleDiagram(regime, score){
  const W=320, H=140, cy=75, amplitude=48;
  const regimeToX = {recovery:55, expansion:140, late_cycle:215, contraction:275};
  const markerX = regimeToX[regime] || 140;
  const sineY = (x) => cy - amplitude * Math.sin(Math.PI * (x - 20) / (W - 40));
  const markerY = sineY(markerX);
  const rc = REGIME_COLORS[regime] || '#5a6d84';
  const rl = {recovery:'회복기', expansion:'확장기', late_cycle:'후기확장', contraction:'수축기'}[regime] || regime;

  let pathD = `M 20,${cy}`;
  for(let x=24; x<=W-20; x+=4){
    pathD += ` L ${x},${sineY(x).toFixed(1)}`;
  }

  const zones = [
    {x1:20,  x2:90,  id:'recovery',  label:'회복기',  color:'#4dabf7', labelX:55},
    {x1:90,  x2:190, id:'expansion', label:'확장기',  color:'#00d4aa', labelX:140},
    {x1:190, x2:240, id:'late_cycle',label:'후기확장', color:'#f0b429', labelX:215},
    {x1:240, x2:300, id:'contraction',label:'수축기', color:'#ff6b6b', labelX:270},
  ];

  let h = `<div style="margin:0 auto 10px;background:var(--elevated);border:1px solid var(--border);border-radius:8px;padding:10px 4px 4px;max-width:340px">`;
  h += `<svg viewBox="0 0 ${W} ${H}" width="100%" style="overflow:visible">`;
  zones.forEach(z => {
    const isActive = regime === z.id;
    if(isActive) h += `<rect x="${z.x1}" y="20" width="${z.x2-z.x1}" height="${H-38}" fill="${z.color}" opacity="0.07" rx="3"/>`;
    if(z.x1 > 20) h += `<line x1="${z.x1}" y1="20" x2="${z.x1}" y2="${H-22}" stroke="var(--border)" stroke-width="1" stroke-dasharray="3,3"/>`;
    h += `<text x="${z.labelX}" y="${H-6}" text-anchor="middle" font-size="8" font-family="var(--font)" fill="${isActive ? z.color : 'var(--dim)'}" font-weight="${isActive ? '700' : '400'}">${z.label}</text>`;
  });
  h += `<line x1="20" y1="${cy}" x2="${W-20}" y2="${cy}" stroke="var(--border)" stroke-width="1" opacity="0.5"/>`;
  h += `<path d="${pathD}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>`;
  h += `<circle cx="${markerX}" cy="${markerY.toFixed(1)}" r="7" fill="${rc}" opacity="0.25"><animate attributeName="r" values="6;10;6" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;0.1;0.5" dur="2s" repeatCount="indefinite"/></circle>`;
  h += `<circle cx="${markerX}" cy="${markerY.toFixed(1)}" r="4" fill="${rc}"/>`;
  h += `<line x1="${markerX}" y1="${markerY.toFixed(1)}" x2="${markerX}" y2="${H-18}" stroke="${rc}" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>`;
  h += `<text x="${markerX}" y="${H-18}" text-anchor="middle" font-size="9" font-family="var(--font)" fill="${rc}" font-weight="700">${rl} · ${score?.toFixed(0)||'--'}</text>`;
  h += `</svg></div>`;
  return h;
}

// ============================================================
// CYCLE EVIDENCE
// ============================================================
function renderEvidence(scoreData){
  if(!scoreData || !scoreData.dimensions) return '';
  const d = scoreData.dimensions;
  const regime = scoreData.regime;
  // Collect all signals, sort by strength
  const allSigs = [];
  Object.entries(d).forEach(([dimName, dim])=>{
    (dim.contributing_signals||[]).forEach(sig=>{
      allSigs.push({...sig, dimName});
    });
  });
  // Separate by type
  const bulls = allSigs.filter(s=>s.signal_type==='bullish').sort((a,b)=>b.strength-a.strength);
  const bears = allSigs.filter(s=>s.signal_type==='bearish').sort((a,b)=>b.strength-a.strength);
  // Top evidence: strongest signals that drive the regime
  const topEvidence = [...bulls.slice(0,3), ...bears.slice(0,3)].sort((a,b)=>b.strength-a.strength).slice(0,5);
  // Leading indicator summary
  const leadingSigs = allSigs.filter(s=>INDICATOR_TYPE[s.indicator_id]==='leading');
  const leadBull = leadingSigs.filter(s=>s.signal_type==='bullish').length;
  const leadBear = leadingSigs.filter(s=>s.signal_type==='bearish').length;
  const leadNeutral = leadingSigs.filter(s=>s.signal_type==='neutral').length;

  let h = '<div class="evidence-panel">';
  h += '<div class="evidence-title">⚡ 현 국면 판단 근거</div>';
  // Leading indicator summary
  h += `<div style="font-size:10px;color:var(--text);margin-bottom:10px;padding:8px;background:var(--bg);border-radius:4px;border:1px solid var(--border)">`;
  h += `<span style="color:var(--dim);font-family:var(--font)">선행지표 방향:</span> `;
  h += `<span style="color:#00d4aa">▲ ${leadBull}</span> `;
  h += `<span style="color:var(--dim)">● ${leadNeutral}</span> `;
  h += `<span style="color:#ff6b6b">▼ ${leadBear}</span> `;
  h += `<span style="color:var(--dim);margin-left:8px">— ${leadBull>leadBear?'선행지표 다수 긍정적 → 확장 시사':leadBear>leadBull?'선행지표 다수 부정적 → 수축 경고':'선행지표 혼조 → 전환기 가능성'}</span>`;
  h += `</div>`;
  // Top evidence items
  topEvidence.forEach(sig=>{
    const isBull = sig.signal_type==='bullish';
    const icon = isBull ? '▲' : '▼';
    const color = isBull ? '#00d4aa' : '#ff6b6b';
    const indType = INDICATOR_TYPE[sig.indicator_id] || 'coincident';
    const tagClass = indType==='leading'?'tag-leading':indType==='lagging'?'tag-lagging':'tag-coincident';
    h += `<div class="evidence-item">`;
    h += `<span class="evidence-icon" style="color:${color}">${icon}</span>`;
    h += `<span style="font-family:var(--font);font-size:10px;width:100px;flex-shrink:0;color:${color}">${sig.indicator_id}</span>`;
    h += `<span class="evidence-text">${sig.description||''}</span>`;
    h += `<span class="evidence-tag ${tagClass}">${indType}</span>`;
    h += `</div>`;
  });
  h += '</div>';
  return h;
}

// OVERVIEW
// ============================================================
function renderOverview(){
  if(!scoreData){document.getElementById('tab-overview').innerHTML='<div class="loading">데이터 없음. 새로고침을 클릭하거나 python3 main.py collect 실행</div>';return;}
  const s=scoreData, d=s.dimensions||{};
  const allSigs=Object.values(d).flatMap(dim=>dim.contributing_signals||[]);
  const bulls=allSigs.filter(x=>x.signal_type==='bullish').sort((a,b)=>b.strength-a.strength);
  const bears=allSigs.filter(x=>x.signal_type==='bearish').sort((a,b)=>b.strength-a.strength);
  const rc=REGIME_COLORS[s.regime]||'#5a6d84';

  let h='';


  // ─── v4.0: 3-Layer Score 배너 ───
  const p_score = s.predictive_score || 50;
  const d_score = s.diagnostic_score || 50;
  const c_score = s.confirmation_score || 50;
  const scoreGap = s.score_gap || '';
  const p_color = p_score >= 60 ? '#00d4aa' : p_score <= 40 ? '#ff6b6b' : '#f0b429';
  const d_color = d_score >= 60 ? '#00d4aa' : d_score <= 40 ? '#ff6b6b' : '#f0b429';
  const c_color = c_score >= 60 ? '#00d4aa' : c_score <= 40 ? '#ff6b6b' : '#f0b429';

  h += `<div style="display:flex;flex-direction:column;gap:12px;margin-bottom:16px;padding:16px;background:var(--elevated);border:1px solid var(--border);border-radius:8px">`;
  h += `<div style="text-align:center"><div style="font-size:10px;color:var(--dim);font-family:var(--font);letter-spacing:2px">TOTAL SCORE</div><div style="font-size:48px;font-weight:700;font-family:var(--font);color:var(--text)">${s.total_score.toFixed(1)}</div><div style="font-size:11px;color:${rc};letter-spacing:1px;margin-top:4px">${REGIME_LABELS[s.regime]}</div></div>`;
  h += `<div style="display:flex;justify-content:center;gap:30px;border-top:1px solid var(--border);padding-top:12px;margin-top:4px">`;
  h += `<div style="text-align:center;opacity:0.8"><div style="font-size:9px;color:var(--accent);font-family:var(--font);letter-spacing:1px">예측(선행) 50%</div><div style="font-size:16px;font-weight:700;font-family:var(--font);color:${p_color}">${p_score.toFixed(1)}</div></div>`;
  h += `<div style="text-align:center;opacity:0.8"><div style="font-size:9px;color:var(--blue);font-family:var(--font);letter-spacing:1px">진단(동행) 30%</div><div style="font-size:16px;font-weight:700;font-family:var(--font);color:${d_color}">${d_score.toFixed(1)}</div></div>`;
  h += `<div style="text-align:center;opacity:0.8"><div style="font-size:9px;color:var(--dim);font-family:var(--font);letter-spacing:1px">확인(후행) 20%</div><div style="font-size:16px;font-weight:700;font-family:var(--font);color:${c_color}">${c_score.toFixed(1)}</div></div>`;
  h += `</div></div>`;
  if (scoreGap) h += `<div style="font-size:10px;color:var(--warn);font-family:var(--font);text-align:center;margin-bottom:12px">${scoreGap}</div>`;
  // ────────────────────────────────────────

  if (s.trend_alert) {
      const isBull = s.trend_alert.includes('BOTTOM') || s.trend_alert.includes('ACCELERAT') || s.trend_alert.includes('DECOUP');
      const isBear = s.trend_alert.includes('WARNING') || s.trend_alert.includes('SLOWING');
      const cls = isBull ? 'bull' : isBear ? 'bear' : '';
      const icon = isBull ? '🚀' : isBear ? '⚠️' : '💡';

  // Cycle Evidence Panel
  h += renderEvidence(scoreData);

  h+='<div class="grid3">';
  // Left: Score + Cycle Diagram
  h+='<div>';
  h+='<div class="card" style="text-align:center">';
  h+='<div class="card-title">SEMICONDUCTOR CYCLE SCORE</div>';

  h += renderCycleDiagram(s.regime, s.total_score);

  h+=`<div style="font-size:10px;color:var(--dim);margin-top:10px;text-align:left;line-height:1.6">${(s.regime_description||'').replace(/\[.*?\]\s*/,'')}</div>`;

  h+='<div>';

    h+=`<div class="cov-detail" style="display:none" id="cov-${name}">`;

    h+=`</div>`;

    // v4.0: Demand 차원일 경우 서브차원 표시
    if(name === 'demand_cycle' && s.demand_sub) {
      const ai = (s.demand_sub.ai_infra || 50).toFixed(1);
      const cons = (s.demand_sub.consumer_traditional || 50).toFixed(1);
      const ai_c = parseFloat(ai) >= 60 ? '#00d4aa' : parseFloat(ai) <= 40 ? '#ff6b6b' : '#f0b429';

      h+=`<span style="color:var(--dim)">└ 소비자/전통(30%): <span style="color:${cons_c};font-weight:700">${cons}</span></span>`;
      h+=`</div>`;
    }
    h+=`<div class="sub-signals" id="sub-${name}" style="display:none">`;
    (dim.contributing_signals||[]).forEach(sig=>{
      const sc=SIG_COLORS[sig.signal_type];

    });

  });
  h+='</div>';
  // Radar chart
  h+='<div class="card" style="margin-top:12px"><div class="card-title">DIMENSIONAL PROFILE</div><div class="chart-wrap"><canvas id="radarChart"></canvas></div></div>';
  h+='</div>';

  // Right: Signals
  h+='<div>';
  h+=`<div class="card"><div class="card-title" style="color:#00d4aa">&#9650; BULLISH (${bulls.length})</div>`;
  bulls.slice(0,5).forEach(sig=>{
    h+=`<div class="sig-card bull"><div style="display:flex;justify-content:space-between"><span class="sig-id" style="color:#00d4aa">${sig.indicator_id}</span><span class="sig-str">${Math.round(sig.strength*100)}%</span></div><div class="sig-desc">${sig.description||''}</div></div>`;
  });
  h+='</div>';
  h+=`<div class="card" style="margin-top:12px"><div class="card-title" style="color:#ff6b6b">&#9660; BEARISH (${bears.length})</div>`;
  bears.slice(0,5).forEach(sig=>{
    h+=`<div class="sig-card bear"><div style="display:flex;justify-content:space-between"><span class="sig-id" style="color:#ff6b6b">${sig.indicator_id}</span><span class="sig-str">${Math.round(sig.strength*100)}%</span></div><div class="sig-desc">${sig.description||''}</div></div>`;

  h+='</div></div>';
  h+='</div>';

  document.getElementById('tab-overview').innerHTML=h;

  // Radar
  const dims=Object.entries(d);
  if(dims.length>0){

    if(ctx){

    }
  }
}

function toggleSub(id){
  const e=document.getElementById(id);
  if(e)e.style.display=e.style.display==='none'?'':'none';

  const covId=id.replace('sub-','cov-');

function renderScenarios(){
  if(!scenarioData||!scenarioData.scenarios){document.getElementById('tab-scenarios').innerHTML='<div class="loading">데이터 없음</div>';return;}
  
  let h = '<div class="card"><div class="card-title">DYNAMIC SCENARIO ANALYSIS</div>';
  h += '<div style="font-size:11px;color:var(--text);line-height:1.6;margin-bottom:16px">각 이벤트의 예상 발생 확률을 조절하여 총점(Expected Score)의 변화를 직접 시뮬레이션 해보세요.</div>';
  
  const baseScore = scoreData?.total_score || 50.0;
  h += `<div style="display:flex;justify-content:center;align-items:center;gap:20px;margin-bottom:24px;padding:16px;background:var(--bg);border:1px solid var(--border);border-radius:8px">`;
  h += `<div><div style="font-size:9px;color:var(--dim);font-family:var(--font);letter-spacing:1px;text-align:center">CURRENT BASE SCORE</div><div style="font-size:24px;font-weight:700;font-family:var(--font);color:var(--text);text-align:center">${baseScore.toFixed(1)}</div></div>`;
  h += `<div style="color:var(--border)">▶</div>`;
  h += `<div><div style="font-size:9px;color:var(--accent);font-family:var(--font);letter-spacing:1px;text-align:center">SIMULATED EXPECTED SCORE</div><div id="dyn-expected-score" style="font-size:32px;font-weight:700;font-family:var(--font);color:var(--accent);text-align:center">${baseScore.toFixed(1)}</div></div>`;
  h += `</div>`;

  window.updateScenarioMath = function() {
    let expected = baseScore;
    document.querySelectorAll('.scen-slider').forEach(el => {
        let prob = parseFloat(el.value) / 100.0;
        let impact = parseFloat(el.dataset.impact);
        let scDelta = impact * prob;
        expected += scDelta;
        
        document.getElementById('scen-prob-'+el.dataset.idx).innerText = el.value + '%';
        let deltaSpan = document.getElementById('scen-delta-'+el.dataset.idx);
        deltaSpan.innerText = (scDelta>0?'+':'') + scDelta.toFixed(1);
        deltaSpan.style.color = scDelta>0 ? '#00d4aa' : '#ff6b6b';
    });
    
    expected = Math.max(0, Math.min(100, expected)); // bound to 0-100
    const expEl = document.getElementById('dyn-expected-score');
    expEl.innerText = expected.toFixed(1);
    expEl.style.color = expected >= 65 ? '#00d4aa' : expected < 40 ? '#ff6b6b' : '#f0b429';
  };
  
  h += `<div style="display:grid;gap:12px">`;
  (scenarioData.scenarios||[]).forEach((sc, idx)=>{
    const s = sc.scenario||{};
    let initProb = 30; // 기준 확률 시작점
    if (s.name.includes("China")) initProb = 40;
    if (s.name.includes("Recession")) initProb = 20;

    h += `<div style="padding:16px;background:var(--elevated);border:1px solid var(--border);border-radius:6px">`;
    h += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">`;
    h += `<span style="font-size:12px;font-weight:600;color:var(--text)">${s.name||''}</span>`;
    h += `<span style="font-size:11px;font-family:var(--font);background:var(--bg);padding:2px 8px;border-radius:4px">예상 변동 폭: <span id="scen-delta-${idx}" style="color:${sc.delta>0?'#00d4aa':'#ff6b6b'};font-weight:700;margin-left:4px">0.0</span> <span style="color:var(--dim);font-size:9px;margin-left:4px">(Max Impact: ${sc.delta>0?'+':''}${sc.delta.toFixed(1)})</span></span>`;
    h += `</div>`;
    h += `<div style="font-size:10px;color:var(--dim);margin-bottom:12px;line-height:1.5">${s.description||''}</div>`;
    h += `<div style="display:flex;align-items:center;gap:12px">`;
    h += `<span style="font-size:9px;color:var(--dim)">0% (발생 안함)</span>`;
    h += `<input type="range" class="scen-slider" data-idx="${idx}" data-impact="${sc.delta}" value="${initProb}" min="0" max="100" step="5" oninput="updateScenarioMath()" style="flex:1;accent-color:var(--accent);cursor:pointer">`;
    h += `<span id="scen-prob-${idx}" style="font-size:11px;font-family:var(--font);width:40px;text-align:right;color:var(--text);font-weight:600">${initProb}%</span>`;
    h += `</div></div>`;
  });
  h += `</div></div>`;

  document.getElementById('tab-scenarios').innerHTML=h;
  setTimeout(() => window.updateScenarioMath(), 100);
}

async function renderTrends(){
  const history=await fetchJSON('/api/score/history?days=180');
  let h='<div class="card"><div class="card-title">COMPOSITE SCORE TREND</div><div class="chart-wrap" style="height:280px"><canvas id="trendChart"></canvas></div></div>';
  document.getElementById('tab-trends').innerHTML=h;

  if(history?.history?.length>0){
    const data=history.history;
    const ctx=document.getElementById('trendChart');
    if(ctx){
      if(charts.trend)charts.trend.destroy();
      const datasets=[
        {label:'Total',data:data.map(d=>d.total_score),borderColor:'#00d4aa',backgroundColor:'rgba(0,212,170,0.1)',fill:true,tension:0.3,pointRadius:0},
      ];
      if(data[0].demand_score!=null){
        datasets.push({label:'Demand',data:data.map(d=>d.demand_score),borderColor:'#00d4aa',borderDash:[4,4],tension:0.3,pointRadius:0,borderWidth:1});
        datasets.push({label:'Supply',data:data.map(d=>d.supply_score),borderColor:'#4dabf7',borderDash:[4,4],tension:0.3,pointRadius:0,borderWidth:1});
        datasets.push({label:'Price',data:data.map(d=>d.price_score),borderColor:'#f0b429',borderDash:[4,4],tension:0.3,pointRadius:0,borderWidth:1});
        datasets.push({label:'Macro',data:data.map(d=>d.macro_score),borderColor:'#e64980',borderDash:[4,4],tension:0.3,pointRadius:0,borderWidth:1});
      }
      charts.trend=new Chart(ctx,{type:'line',data:{labels:data.map(d=>d.date),datasets},
        options:{scales:{x:{grid:{color:'#1c2638'},ticks:{color:'#5a6d84',font:{size:8},maxTicksLimit:10}},y:{min:20,max:90,grid:{color:'#1c2638'},ticks:{color:'#5a6d84',font:{size:9}}}},plugins:{legend:{labels:{color:'#5a6d84',font:{size:9}}}},responsive:true,maintainAspectRatio:false}});
    }
  } else {
    document.getElementById('tab-trends').innerHTML='<div class="card"><div class="loading">Score history가 아직 없습니다. 데이터가 매일 자동 수집되면 여기에 추세가 축적됩니다.</div></div>';
  }
}

  const weightRationale = {
    demand_cycle: {pct:'30%', why:'반도체 매출의 80% 이상이 수요 사이클에 직접 연동. AI 인프라(70%)/소비자 전통(30%) 서브차원으로 분해. Hyperscaler CapEx, ISM 신규주문이 핵심 선행 지표.'},
    supply_cycle: {pct:'20%', why:'공급 과잉/부족이 가격과 마진을 결정. 가동률 80% 이상에서 증설 투자 트리거, 장비 프록시(EQUIP_PROXY)가 핵심.'},
    price_cycle: {pct:'20%', why:'DRAM/NAND 가격이 반도체 기업 실적에 직접 반영. 메모리 가격 상승/하락 사이클이 투자 수익률을 좌우.'},
    macro_regime: {pct:'20%', why:'금리·유동성 환경이 테크 밸류에이션의 할인율을 결정. v4.0: HY Credit Spread(신용 리스크 선행)과 Sahm Rule(리세션 실시간 탐지) 신규 편입.'},
    global_demand: {pct:'10%', why:'반도체는 글로벌 교역재. 중국이 최대 소비국(~35%)이나 수출 규제로 직접 영향이 제한적이어서 비중 하향.'}
  };
  let h = '<div class="card"><div class="card-title">v4.1 아키텍처: 3-Layer 예측 시스템</div>';
  h += '<div style="font-size:11px;line-height:1.7;color:var(--text);margin-bottom:16px">';
  h += '<b style="color:var(--accent)">핵심 원칙:</b> 단순 가중 평균이 아닌, 지표의 선후행성(Timing)에 따라 3개 계층으로 분리하여 사이클 방향성을 조기 포착합니다.<br><br>';
  h += '<b style="color:var(--accent)">■ Layer 1: 예측 스코어 (Predictive, 50%)</b> — 선행지표만. 향후 3~6개월 방향을 가리킵니다. Sigmoid 변환 적용으로 임계값 근처 신호를 날카롭게 포착.<br>';
  h += '<b style="color:var(--blue)">■ Layer 2: 진단 스코어 (Diagnostic, 30%)</b> — 동행지표만. 현재 사이클 위치를 실시간 반영합니다.<br>';
  h += '<b style="color:var(--dim)">■ Layer 3: 확인 스코어 (Confirmation, 20%)</b> — 후행지표만. 국면 전환이 실제로 일어났는지 사후 확증합니다.<br><br>';
  h += '<b style="color:var(--warn)">■ 복합 점수 = 예측(50%) + 진단(30%) + 확인(20%)</b><br>';
  h += '<b style="color:var(--warn)">■ Regime Engine:</b> 진입/이탈 임계값 분리(Hysteresis)로 경계에서의 불안정한 국면 전환을 방지합니다.<br>';
  h += '</div></div>';

  h += '<div class="card" style="margin-top:12px"><div class="card-title">차원별 가중치 근거</div>';
  Object.entries(weightRationale).forEach(([name,info])=>{
    const dname = {demand_cycle:'수요 사이클',supply_cycle:'공급 사이클',price_cycle:'가격 사이클',macro_regime:'매크로 레짐',global_demand:'글로벌 수요'}[name]||name;
    h+=`<div style="padding:10px 0;border-bottom:1px solid var(--border)">`;
    h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-family:var(--font);font-size:10px;color:var(--accent);font-weight:700">${dname}</span><span style="font-family:var(--font);font-size:10px;background:var(--elevated);padding:2px 6px;border-radius:3px;color:var(--dim)">${info.pct}</span></div>`;
    h+=`<div style="font-size:10px;color:var(--text);line-height:1.6">${info.why}</div>`;
    h+=`</div>`;
  });
  h+='</div>';

  h += '<div class="card" style="margin-top:12px"><div class="card-title">선후행 분류 (Timing Classes)</div>';
  h += '<div style="font-size:10px;line-height:1.8;color:var(--text)">';
  h += '<div><span class="evidence-tag tag-leading" style="display:inline-block;margin-right:6px">선행</span>DGORDER, ISM_MFG, YIELD_CURVE, LEI, HOUSING, EQUIP_PROXY, HY_SPREAD</div>';
  h += '<div><span class="evidence-tag tag-coincident" style="display:inline-block;margin-right:6px">동행</span>INDPRO, DRAM_PROXY, NAND_PROXY, RETAIL, CONSUMER_CONF, FOMC, SOX, CHINA_PMI, SAHM_RULE</div>';
  h += '<div><span class="evidence-tag tag-lagging" style="display:inline-block;margin-right:6px">후행</span>GDP, CPI, PPI, NFP, TRADE, WSTS, PRODUCTIVITY, HYPERSCALER_CAPEX</div>';
  h += '</div></div>';

  h += '<div class="card" style="margin-top:12px"><div class="card-title">데이터 소스 및 한계</div>';
  h += '<div style="font-size:10px;line-height:1.7;color:var(--text)">';
  h += '모든 데이터는 FRED API, Yahoo Finance, WSTS 등에서 자동 수집됩니다. ';
  h += '데이터 미확보 지표는 중립(50점)으로 처리되며, 커버리지가 낮을수록 신뢰도가 저하됩니다.<br><br>';
  h += '<b>이 모델은 투자 조언이 아닙니다.</b> 투자 판단의 보조 도구로서만 활용하시기 바랍니다.';
  h += '</div></div>';

  h += '<div class="card" style="margin-top:12px"><div class="card-title">CYCLE 전환 임계값 (Score Thresholds)</div>';
  h += '<div style="font-size:11px;line-height:1.8;color:var(--text)">';
  h += '<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--border)"><div style="width:14px;height:14px;border-radius:3px;background:var(--accent)"></div><b style="width:120px">확장기 (Expansion)</b><span style="color:var(--dim);font-family:var(--font);width:60px">65점 이상</span><span>반도체 사이클 최적기. 집중 매수 및 비중 극한.</span></div>';
  h += '<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--border)"><div style="width:14px;height:14px;border-radius:3px;background:var(--warn)"></div><b style="width:120px">후기확장 (Late Cycle)</b><span style="color:var(--dim);font-family:var(--font);width:60px">50점 이상</span><span>혼조세 및 고점 징후. 부분 차익실현 및 방어 선별.</span></div>';
  h += '<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--border)"><div style="width:14px;height:14px;border-radius:3px;background:var(--blue)"></div><b style="width:120px">회복기 (Recovery)</b><span style="color:var(--dim);font-family:var(--font);width:60px">35-50 구간</span><span>바닥 탈출의 초기 신호. 장비/소재 등 선별적 1차 매수 진입.</span></div>';
  h += '<div style="display:flex;align-items:center;gap:8px;padding:4px 0"><div style="width:14px;height:14px;border-radius:3px;background:var(--red)"></div><b style="width:120px">수축기 (Contraction)</b><span style="color:var(--dim);font-family:var(--font);width:60px">35점 미만</span><span>완전한 침체 및 하락. 현금 비중 최대화 및 올관망.</span></div>';
  h += '</div></div>';

  document.getElementById('tab-methodology').innerHTML=h;
}

// MEMORY REFERENCE TAB
// ============================================================
async function renderMemoryReference() {
  document.getElementById("tab-reference").innerHTML = "<div class=\"loading\">레퍼런스 데이터 로딩 중...</div>";

  const omdiaRes = await fetchJSON("/api/reference/omdia");
  const wstsRes = await fetchJSON("/api/reference/wsts");

  if(!omdiaRes || !wstsRes) {
      document.getElementById("tab-reference").innerHTML = "<div class=\"loading\">데이터를 불러오지 못했습니다. import_memory_reference.py가 실행되었는지 확인하세요.</div>";
      return;
  }

  let h = "<div class=\"card\"><div class=\"card-title\">Memory Market Reference (Offline)</div>";
  h += "<div style=\"font-size:11px;color:var(--text);line-height:1.6;margin-bottom:16px;\">";
  h += "이 데이터는 실시간 스코어 예측 과정에 전혀 관여하지 않으며, 과거 사이클과 수급 펀더멘털을 거시적으로 복기하는 <b>종속 격리(Isolated) 레퍼런스</b> 용도입니다.<br>";
  h += "현재 데이터: Omdia (1Q11 ~ 4Q25 Actual), WSTS (1991 ~ 2025).</div>";

  h += "<div class=\"grid2\">";
  h += "<div class=\"card\"><div class=\"card-title\">Omdia DRAM Sufficiency Ratio vs Supply/Demand</div><div style=\"height:300px;\"><canvas id=\"omdiaChart\"></canvas></div></div>";
  h += "<div class=\"card\"><div class=\"card-title\">WSTS Global Memory Revenue ($M)</div><div style=\"height:300px;\"><canvas id=\"wstsChart\"></canvas></div></div>";
  h += "</div></div>";

  document.getElementById("tab-reference").innerHTML = h;

  const omdiaData = omdiaRes.data || [];
  if(omdiaData.length > 0) {
      const dramData = omdiaData.filter(d => d.product === "DRAM");
      const dates = [...new Set(dramData.map(d => d.reference_date))].sort();
      const getMetric = (metricName) => dates.map(dt => {
          const row = dramData.find(d => d.reference_date === dt && d.metric === metricName);
          return row ? row.value : null;
      });
      const supply = getMetric("supply");
      const demand = getMetric("demand");
      const sufficiency = getMetric("Sufficiency");

      new Chart(document.getElementById("omdiaChart"), {
          type: "line",
          data: {
              labels: dates,
              datasets: [
                  { label:"Sufficiency Ratio (%)", data: sufficiency, yAxisID: "y1", borderColor: "var(--accent)", backgroundColor:"rgba(0,212,170,0.1)", fill:true, tension:0.4, borderWidth:2, pointRadius:0 },
                  { label:"Supply (M GB)", data: supply, yAxisID: "y2", borderColor: "var(--blue)", borderDash:[5,5], tension:0.4, borderWidth:1, pointRadius:0 },
                  { label:"Demand (M GB)", data: demand, yAxisID: "y2", borderColor: "var(--warn)", borderDash:[2,2], tension:0.4, borderWidth:1, pointRadius:0 }
              ]
          },
          options: {
              responsive:true, maintainAspectRatio:false,
              interaction: { mode: "index", intersect: false },
              scales: {
                  x: { grid:{color:"var(--border)"}, ticks:{color:"var(--dim)", font:{family:"var(--font)",size:9}} },
                  y1: { type:"linear", position:"left", grid:{color:"var(--border)"}, ticks:{color:"var(--accent)", font:{family:"var(--font)",size:9}} },
                  y2: { type:"linear", position:"right", grid:{drawOnChartArea:false}, ticks:{color:"var(--dim)", font:{family:"var(--font)",size:9}} }
              },
              plugins: { legend: { labels: { color:"var(--dim)", font:{family:"var(--font)",size:10} } } }
          }
      });
  }

  const wstsData = wstsRes.data || [];
  if(wstsData.length > 0) {
      const dramRev = wstsData.filter(d => d.product === "DRAM" && d.metric === "Revenue");
      const dates = [...new Set(dramRev.map(d => d.reference_date))].sort();
      const dramVals = dates.map(dt => { const r = dramRev.find(d=>d.reference_date===dt); return r?r.value:null; });

      new Chart(document.getElementById("wstsChart"), {
          type: "line",
          data: {
              labels: dates,
              datasets: [
                  { label:"DRAM Revenue", data: dramVals, borderColor: "var(--blue)", backgroundColor:"rgba(77,171,247,0.1)", fill:true, tension:0.4, borderWidth:2, pointRadius:0 }
              ]
          },
          options: {
              responsive:true, maintainAspectRatio:false,
              interaction: { mode: "index", intersect: false },
              scales: {
                  x: { grid:{color:"var(--border)"}, ticks:{color:"var(--dim)", font:{family:"var(--font)",size:9}} },
                  y: { grid:{color:"var(--border)"}, ticks:{color:"var(--blue)", font:{family:"var(--font)",size:9}} }
              },
              plugins: { legend: { labels: { color:"var(--dim)", font:{family:"var(--font)",size:10} } } }
          }
      });
  }
}
